<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Jam Guide — Saxophone</title>
  <meta name="description" content="Guide de jam pour saxophone — trouve instantanément ta gamme selon la tonalité annoncée.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jam Sax">
  <meta name="theme-color" content="#08080d">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #08080d;
      --bg2: #111118;
      --bg3: #1a1a24;
      --bg4: #222233;
      --text: #ededf4;
      --text2: #8585a0;
      --text3: #555568;
      --border: #252538;
      --accent: #5090ff;
      --accent-dim: #3060c0;
      --accent-glow: rgba(80,144,255,0.15);
      --green: #20d48e;
      --green-dim: #16a06a;
      --green-glow: rgba(32,212,142,0.12);
      --green-border: rgba(32,212,142,0.28);
      --blue-glow: rgba(80,144,255,0.10);
      --blue-border: rgba(80,144,255,0.28);
      --orange: #f0a030;
      --orange-glow: rgba(240,160,48,0.10);
      --orange-border: rgba(240,160,48,0.28);
      --red: #f06060;
      --red-glow: rgba(240,96,96,0.12);
      --radius: 14px;
      --radius-sm: 10px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bottom) + 20px);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-sub {
      font-size: 12px;
      color: var(--text3);
      font-weight: 500;
    }

    /* ─── Sax selector (top pill) ─── */
    .sax-picker {
      display: flex;
      gap: 0;
      background: var(--bg2);
      padding: 3px;
      border-radius: var(--radius);
      margin-bottom: 18px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .sax-picker::before {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: calc(50% - 3px);
      height: calc(100% - 6px);
      background: var(--bg3);
      border-radius: 11px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      z-index: 0;
    }
    .sax-picker.tenor::before {
      transform: translateX(100%);
    }
    .sax-btn {
      flex: 1;
      padding: 11px 0;
      font-size: 14px;
      font-weight: 600;
      border: none;
      background: transparent;
      color: var(--text3);
      cursor: pointer;
      transition: color 0.25s;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .sax-btn.active { color: var(--text); }
    .sax-btn .sax-icon {
      font-size: 16px;
      opacity: 0.5;
      transition: opacity 0.25s;
    }
    .sax-btn.active .sax-icon { opacity: 1; }
    .sax-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .sax-btn.active .sax-tag {
      background: var(--accent-glow);
      color: var(--accent);
    }
    .sax-btn:not(.active) .sax-tag { display: none; }

    /* ─── Mode toggle ─── */
    .mode-bar {
      display: flex;
      gap: 4px;
      background: var(--bg2);
      padding: 3px;
      border-radius: var(--radius);
      margin-bottom: 22px;
      border: 1px solid var(--border);
    }
    .mode-btn {
      flex: 1;
      padding: 10px 0;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 11px;
      background: transparent;
      color: var(--text3);
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: var(--bg3);
      color: var(--text);
      box-shadow: 0 1px 6px rgba(0,0,0,0.25);
    }

    /* ─── Section steps ─── */
    .step {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .step span { color: var(--accent); }

    /* ─── Concert key grid ─── */
    .key-section { margin-bottom: 22px; }
    .key-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(54px, 1fr));
      gap: 6px;
    }
    .kbtn {
      height: 50px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg2);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }
    .kbtn:active { transform: scale(0.93); }
    .kbtn.altered { background: var(--bg3); color: var(--text2); border-color: var(--border); }
    .kbtn.sel {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 16px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.3);
    }

    /* ─── Scale grid ─── */
    .scale-section { margin-bottom: 24px; }
    .scale-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .sbtn {
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg2);
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .sbtn:active { transform: scale(0.95); }
    .sbtn .stag { font-size: 10px; font-weight: 500; color: var(--text3); transition: color 0.15s; }
    .sbtn.sel {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
      box-shadow: 0 0 16px var(--green-glow), 0 2px 8px rgba(0,0,0,0.3);
    }
    .sbtn.sel .stag { color: rgba(255,255,255,0.65); }

    /* ─── Result card ─── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      animation: slideUp 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      margin-bottom: 6px;
    }
    .hero-note {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 2px;
      background: linear-gradient(135deg, var(--accent), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 18px;
      line-height: 1.6;
    }
    .hero-sub strong { color: var(--text); font-weight: 600; }

    /* ─── Note chips ─── */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      min-width: 48px;
    }
    .chip-name { font-size: 16px; font-weight: 700; }
    .chip-role { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .chip-root { background: var(--green-glow); border: 1px solid var(--green-border); }
    .chip-root .chip-name { color: var(--green); }
    .chip-root .chip-role { color: var(--green-dim); }
    .chip-on { background: var(--blue-glow); border: 1px solid var(--blue-border); }
    .chip-on .chip-name { color: var(--accent); }
    .chip-on .chip-role { color: var(--accent-dim); }
    .chip-blue { background: var(--orange-glow); border: 1px solid var(--orange-border); }
    .chip-blue .chip-name { color: var(--orange); }
    .chip-blue .chip-role { color: #c08020; }

    /* ─── Legend ─── */
    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
    .leg { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); font-weight: 500; }
    .leg-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    /* ─── Keyboard ─── */
    .kb-wrap { overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; margin-bottom: 4px; }
    .kb-outer {
      position: relative;
      height: 105px;
      min-width: 440px;
      display: flex;
      gap: 2px;
    }
    .wk {
      flex: 1;
      min-width: 28px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 0 0 7px 7px;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 6px;
      transition: background 0.15s;
    }
    .wk.wk-on { background: var(--accent); border-color: var(--accent-dim); box-shadow: 0 2px 10px var(--accent-glow); }
    .wk.wk-root { background: var(--green); border-color: var(--green-dim); box-shadow: 0 2px 10px var(--green-glow); }
    .wk.wk-blue { background: var(--orange); border-color: #c08020; box-shadow: 0 2px 10px var(--orange-glow); }
    .wk-lbl { font-size: 10px; font-weight: 600; color: var(--text3); }
    .wk.wk-on .wk-lbl, .wk.wk-root .wk-lbl, .wk.wk-blue .wk-lbl { color: #fff; }
    .bk-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .bk {
      position: absolute;
      width: 22px;
      height: 62px;
      background: #141420;
      border: 1px solid #2a2a3c;
      border-top: none;
      border-radius: 0 0 5px 5px;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 5px;
      transition: background 0.15s;
    }
    .bk.bk-on { background: var(--accent); border-color: var(--accent-dim); }
    .bk.bk-root { background: var(--green); border-color: var(--green-dim); }
    .bk.bk-blue { background: var(--orange); border-color: #c08020; }
    .bk-lbl { font-size: 8px; color: rgba(255,255,255,0.85); font-weight: 600; }

    /* ─── Tip box ─── */
    .tip {
      background: var(--bg3);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 13px;
      color: var(--text2);
      line-height: 1.65;
      margin-top: 14px;
      border-left: 3px solid var(--accent);
    }
    .tip strong { color: var(--text); font-weight: 600; }

    /* ─── Empty state ─── */
    .empty {
      text-align: center;
      padding: 52px 20px;
      color: var(--text3);
      font-size: 14px;
      line-height: 1.6;
    }
    .empty-icon { font-size: 36px; margin-bottom: 10px; display: block; opacity: 0.5; }

    /* ─── Quiz ─── */
    .score-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 18px;
      font-weight: 500;
    }
    .score-val { font-size: 22px; font-weight: 700; color: var(--text); }
    .small-btn {
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg2);
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .small-btn:active { transform: scale(0.95); background: var(--bg3); }
    .score-bar .push-right { margin-left: auto; }
    .quiz-q {
      font-size: 15px;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 16px;
      line-height: 1.65;
    }
    .quiz-q strong { color: var(--accent); font-weight: 700; }
    .quiz-opts { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .qopt {
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg2);
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      min-width: 68px;
      text-align: center;
    }
    .qopt:active { transform: scale(0.93); }
    .qopt.correct {
      background: var(--green-glow);
      border-color: var(--green);
      color: var(--green);
      box-shadow: 0 0 12px var(--green-glow);
    }
    .qopt.wrong {
      background: var(--red-glow);
      border-color: var(--red);
      color: var(--red);
    }
    .quiz-fb {
      font-size: 13px;
      min-height: 20px;
      margin-bottom: 14px;
      line-height: 1.5;
      font-weight: 500;
    }
    .quiz-next {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: none;
      transition: all 0.15s;
      box-shadow: 0 2px 10px var(--accent-glow);
    }
    .quiz-next:active { transform: scale(0.95); }

    /* ─── Responsive ─── */
    @media (min-width: 500px) {
      body { padding-left: 24px; padding-right: 24px; max-width: 540px; margin: 0 auto; }
    }
    @media (hover: none) {
      .kbtn:active, .sbtn:active, .qopt:active, .small-btn:active { opacity: 0.85; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Jam Guide</h1>
    <div class="header-sub" id="transpo-hint">Transposition Eb</div>
  </div>

  <!-- Saxophone selector -->
  <div class="sax-picker" id="sax-picker">
    <button class="sax-btn active" id="btn-alto" onclick="setSax('alto')">
      <span class="sax-icon">&#127927;</span> Alto <span class="sax-tag">Eb</span>
    </button>
    <button class="sax-btn" id="btn-tenor" onclick="setSax('tenor')">
      <span class="sax-icon">&#127927;</span> Tenor <span class="sax-tag">Bb</span>
    </button>
  </div>

  <!-- Mode toggle -->
  <div class="mode-bar">
    <button class="mode-btn active" id="btn-find" onclick="setMode('find')">Trouver ma gamme</button>
    <button class="mode-btn" id="btn-quiz" onclick="setMode('quiz')">Entrainement</button>
  </div>

  <!-- Find panel -->
  <div id="panel-find">
    <div class="key-section">
      <div class="step"><span>1</span> &mdash; Tonalite concert (annoncee par le groupe)</div>
      <div class="key-grid" id="key-grid"></div>
    </div>
    <div class="scale-section">
      <div class="step"><span>2</span> &mdash; Type de gamme</div>
      <div class="scale-grid" id="scale-grid"></div>
    </div>
    <div id="result-area">
      <div class="empty">
        <span class="empty-icon">&#9835;</span>
        Selectionne une tonalite<br>et une gamme
      </div>
    </div>
  </div>

  <!-- Quiz panel -->
  <div id="panel-quiz" style="display:none">
    <div class="score-bar">
      Score : <span class="score-val" id="score-disp">0 / 0</span>
      <button class="small-btn push-right" onclick="resetQuiz()">Reset</button>
      <button class="small-btn" onclick="newQuestion()">Suivante</button>
    </div>
    <div id="quiz-area"></div>
  </div>

<script>
const ALL_KEYS=[
  {name:'Do',   midi:0, alt:null},
  {name:'Do#',  midi:1, alt:'Reb'},
  {name:'Reb',  midi:1, alt:'Do#'},
  {name:'Re',   midi:2, alt:null},
  {name:'Re#',  midi:3, alt:'Mib'},
  {name:'Mib',  midi:3, alt:'Re#'},
  {name:'Mi',   midi:4, alt:null},
  {name:'Fa',   midi:5, alt:null},
  {name:'Fa#',  midi:6, alt:'Solb'},
  {name:'Solb', midi:6, alt:'Fa#'},
  {name:'Sol',  midi:7, alt:null},
  {name:'Sol#', midi:8, alt:'Lab'},
  {name:'Lab',  midi:8, alt:'Sol#'},
  {name:'La',   midi:9, alt:null},
  {name:'La#',  midi:10,alt:'Sib'},
  {name:'Sib',  midi:10,alt:'La#'},
  {name:'Si',   midi:11,alt:null},
];

const ALTERED=new Set([1,3,6,8,10]);
const NF=['Do','Reb','Re','Mib','Mi','Fa','Solb','Sol','Lab','La','Sib','Si'];
const NS=['Do','Do#','Re','Re#','Mi','Fa','Fa#','Sol','Sol#','La','La#','Si'];

function nn(midi,sharp){ return (sharp?NS:NF)[((midi%12)+12)%12]; }
function isSharpKey(m){ return [1,2,4,6,7,9,11].includes(m); }

const SAX_TRANSPO = { alto: 9, tenor: 2 };
const SAX_LABEL = { alto: 'Eb', tenor: 'Bb' };

let currentSax = 'alto';

function transpose(concertMidi){
  return ((concertMidi + SAX_TRANSPO[currentSax]) % 12 + 12) % 12;
}

const SCALES={
  'Penta mineure': {iv:[0,3,5,7,10], blue:null, tag:'Blues / Jazz'},
  'Blues':         {iv:[0,3,5,6,7,10],blue:6,    tag:'Blues'},
  'Majeure':       {iv:[0,2,4,5,7,9,11],blue:null,tag:'Jazz majeur'},
  'Mineure nat.':  {iv:[0,2,3,5,7,8,10],blue:null,tag:'Jazz mineur'},
  'Penta majeure': {iv:[0,2,4,7,9], blue:null, tag:'Swing / Gospel'},
  'Dorien':        {iv:[0,2,3,5,7,9,10],blue:null,tag:'Jazz / Funk'},
  'Mixolydien':    {iv:[0,2,4,5,7,9,10],blue:null,tag:'Blues / Rock'},
};

const ivRole={0:'tonique',2:'2',3:'b3',4:'3',5:'4',6:'b5',7:'5',8:'b6',9:'6',10:'b7',11:'7'};

let selKey=null, selScale=null;
let quizScore=0, quizTotal=0, quizAnswered=false;

function setSax(type){
  currentSax = type;
  document.getElementById('sax-picker').classList.toggle('tenor', type==='tenor');
  document.getElementById('btn-alto').classList.toggle('active', type==='alto');
  document.getElementById('btn-tenor').classList.toggle('active', type==='tenor');
  document.getElementById('transpo-hint').textContent = 'Transposition ' + SAX_LABEL[type];
  buildResult();
  if(quizTotal > 0) newQuestion();
}

function buildKeyGrid(){
  const g=document.getElementById('key-grid');
  g.innerHTML='';
  ALL_KEYS.forEach(k=>{
    const b=document.createElement('button');
    b.className='kbtn'+(ALTERED.has(k.midi)?' altered':'')+(selKey&&selKey.name===k.name?' sel':'');
    b.textContent=k.name;
    b.onclick=()=>{ selKey=k; buildKeyGrid(); buildResult(); };
    g.appendChild(b);
  });
}

function buildScaleGrid(){
  const g=document.getElementById('scale-grid');
  g.innerHTML='';
  Object.entries(SCALES).forEach(([name,sc])=>{
    const b=document.createElement('button');
    b.className='sbtn'+(selScale===name?' sel':'');
    b.innerHTML=name+'<span class="stag">'+sc.tag+'</span>';
    b.onclick=()=>{ selScale=name; buildScaleGrid(); buildResult(); };
    g.appendChild(b);
  });
}

function buildResult(){
  const area=document.getElementById('result-area');
  if(!selKey||!selScale){
    area.innerHTML='<div class="empty"><span class="empty-icon">&#9835;</span>Selectionne une tonalite<br>et une gamme</div>';
    return;
  }
  const cM=selKey.midi;
  const sM=transpose(cM);
  const sh=isSharpKey(sM);
  const sName=nn(sM,sh);
  const sc=SCALES[selScale];
  const notes=sc.iv.map(iv=>({name:nn((sM+iv)%12,sh),iv}));
  const saxLabel = currentSax==='alto' ? 'sax alto' : 'sax tenor';

  let h=`<div class="card">
    <div class="hero-label">Tu joues en</div>
    <div class="hero-note">${sName}</div>
    <div class="hero-sub">Groupe en <strong>${selKey.name}</strong> &rarr; toi en <strong>${sName}</strong> sur le ${saxLabel}</div>
    <div class="chips">`;
  notes.forEach(n=>{
    const root=n.iv===0, blue=sc.blue!==null&&n.iv===sc.blue;
    const cls=root?'chip-root':blue?'chip-blue':'chip-on';
    const role=root?'tonique':blue?'blue note':(ivRole[n.iv]||'');
    h+=`<div class="chip ${cls}"><div class="chip-name">${n.name}</div><div class="chip-role">${role}</div></div>`;
  });
  h+=`</div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>Tonique</div>
      <div class="leg"><div class="leg-dot" style="background:var(--accent)"></div>Notes</div>
      ${sc.blue!==null?'<div class="leg"><div class="leg-dot" style="background:var(--orange)"></div>Blue note</div>':''}
    </div>
    <div class="kb-wrap"><div class="kb-outer" id="kb-inner"></div></div>
  </div>`;

  const tips={
    'Penta mineure':'<strong>Tip :</strong> Les 5 notes sonnent toujours bien. Improvise librement sans fausse note.',
    'Blues':'<strong>Tip :</strong> Passe vite sur la blue note (b5) ou tiens-la pour creer la tension blues typique.',
    'Majeure':'<strong>Tip :</strong> Sonne bien sur les accords maj7. Commence et finis tes phrases sur la tonique.',
    'Mineure nat.':'<strong>Tip :</strong> Insiste sur la b3 et la b7 pour un son jazz mineur profond.',
    'Penta majeure':'<strong>Tip :</strong> Plus lumineuse. Parfaite sur un blues rapide ou un standard swing.',
    'Dorien':'<strong>Tip :</strong> Le mode jazz par excellence. La 6te majeure la distingue de la mineure naturelle.',
    'Mixolydien':'<strong>Tip :</strong> Majeure avec b7. Ideal sur les accords de dominante (7).',
  };
  h+=`<div class="tip">${tips[selScale]||''}</div>`;
  area.innerHTML=h;
  requestAnimationFrame(()=>drawKb(sM,sc,sh));
}

function drawKb(root,sc,sh){
  const kb=document.getElementById('kb-inner');
  if(!kb) return;
  kb.innerHTML='';
  const wOrder=[0,2,4,5,7,9,11];
  const bMap={1:0,3:1,6:3,8:4,10:5};
  const ivSet=new Set(sc.iv);
  const whites=[];
  for(let o=0;o<2;o++) wOrder.forEach(w=>whites.push(o*12+w));
  whites.forEach(abs=>{
    const semi=((abs-root)%12+12)%12;
    const isRoot=semi===0, isBlue=sc.blue!==null&&semi===sc.blue, isOn=ivSet.has(semi);
    const d=document.createElement('div');
    d.className='wk'+(isRoot?' wk-root':isBlue?' wk-blue':isOn?' wk-on':'');
    const lbl=document.createElement('div');
    lbl.className='wk-lbl';
    lbl.textContent=(isOn||isRoot)?nn(abs%12,sh):'';
    d.appendChild(lbl);
    kb.appendChild(d);
  });
  const bLayer=document.createElement('div');
  bLayer.className='bk-layer';
  const totalW=kb.offsetWidth||440;
  const wW=totalW/whites.length;
  for(let o=0;o<2;o++){
    Object.entries(bMap).forEach(([bs,wi])=>{
      const abs=o*12+parseInt(bs);
      const semi=((abs-root)%12+12)%12;
      const isRoot=semi===0, isBlue=sc.blue!==null&&semi===sc.blue, isOn=ivSet.has(semi);
      const wIdx=whites.indexOf(o*12+wOrder[parseInt(wi)]);
      if(wIdx<0)return;
      const bk=document.createElement('div');
      bk.className='bk'+(isRoot?' bk-root':isBlue?' bk-blue':isOn?' bk-on':'');
      bk.style.left=((wIdx+0.62)*wW)+'px';
      const lbl=document.createElement('div');
      lbl.className='bk-lbl';
      lbl.textContent=(isOn||isRoot)?nn(abs%12,sh):'';
      bk.appendChild(lbl);
      bLayer.appendChild(bk);
    });
  }
  kb.appendChild(bLayer);
}

function setMode(m){
  document.getElementById('panel-find').style.display=m==='find'?'':'none';
  document.getElementById('panel-quiz').style.display=m==='quiz'?'':'none';
  document.getElementById('btn-find').classList.toggle('active',m==='find');
  document.getElementById('btn-quiz').classList.toggle('active',m==='quiz');
  if(m==='quiz'&&quizTotal===0) newQuestion();
}

function resetQuiz(){
  quizScore=0; quizTotal=0;
  document.getElementById('score-disp').textContent='0 / 0';
  newQuestion();
}

const QUIZ_SCALES=['Penta mineure','Blues','Majeure','Mineure nat.','Dorien','Mixolydien'];
function newQuestion(){
  quizAnswered=false;
  const ck=ALL_KEYS[Math.floor(Math.random()*ALL_KEYS.length)];
  const sM=transpose(ck.midi);
  const sh=isSharpKey(sM);
  const correct=nn(sM,sh);
  const scaleName=QUIZ_SCALES[Math.floor(Math.random()*QUIZ_SCALES.length)];
  const sc=SCALES[scaleName];
  const notesList=sc.iv.map(iv=>nn((sM+iv)%12,sh)).join(' — ');
  const saxLabel = currentSax==='alto' ? 'sax alto' : 'sax tenor';

  const wrongs=[];
  while(wrongs.length<3){
    const r=Math.floor(Math.random()*12);
    if(r!==sM&&!wrongs.includes(r)) wrongs.push(r);
  }
  const opts=[{midi:sM,name:correct},...wrongs.map(m=>({midi:m,name:nn(m,isSharpKey(m))}))].sort(()=>Math.random()-0.5);

  document.getElementById('quiz-area').innerHTML=`
    <div class="card">
      <div class="quiz-q">Le groupe joue en <strong>${ck.name}</strong> &mdash; gamme <strong>${scaleName}</strong>.<br>Dans quelle tonalite tu joues sur ton ${saxLabel} ?</div>
      <div class="quiz-opts">${opts.map(o=>`<button class="qopt" data-midi="${o.midi}" onclick="checkAnswer(${o.midi},${sM},'${notesList.replace(/'/g,"\\'")}')">${o.name}</button>`).join('')}</div>
      <div class="quiz-fb" id="quiz-fb"></div>
      <button class="quiz-next" id="quiz-next" onclick="newQuestion()">Question suivante</button>
    </div>`;
}

function checkAnswer(chosen,correct,notesList){
  if(quizAnswered) return;
  quizAnswered=true;
  quizTotal++;
  const ok=chosen===correct;
  if(ok) quizScore++;
  document.getElementById('score-disp').textContent=quizScore+' / '+quizTotal;
  document.querySelectorAll('.qopt').forEach(b=>{
    const v=parseInt(b.dataset.midi);
    if(v===correct) b.classList.add('correct');
    else if(v===chosen&&!ok) b.classList.add('wrong');
    b.style.pointerEvents='none';
  });
  const fb=document.getElementById('quiz-fb');
  fb.style.color=ok?'var(--green)':'var(--red)';
  fb.textContent=ok?'Correct ! Notes : '+notesList:'Rate — la bonne reponse donne : '+notesList;
  document.getElementById('quiz-next').style.display='inline-block';
}

buildKeyGrid();
buildScaleGrid();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
